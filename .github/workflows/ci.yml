name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spotless:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - run: mvn spotless:check -B

  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Project compiles with maven.compiler.release=21 (root pom), so JDK 17 cannot build it.
        java: ['21']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn clean verify -T 1C -Dspotless.check.skip=true -Dsurefire.useSystemClassLoader=false -B -V

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  api-compat:
    name: API Compatibility (japicmp)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      # Runs japicmp against the baseline version declared in kairo-api/pom.xml
      # (default: 1.0.0). Gate is scoped to @Stable types; @Experimental / @Internal
      # surfaces pass through silently. Fails the build on any binary or source
      # incompatible change to a @Stable type so PRs catch SPI breaks before merge.
      - name: Run japicmp gate
        run: mvn -Papi-compat -pl kairo-api -am -DskipTests verify -B
